<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="./assets/css/style.css">
        <title>TheKnowDough</title>
        <link rel="icon" type="image/x-icon" href="/assets/img/favicon.png">
        <link rel="me" href="https://waag.social/@theknowdough">
        <meta charset="UTF-8">
        <meta name="description" content="Computational design & science, audiovisual art.">
        <meta name="og:description" content="Computational design & science, audiovisual art.">
        <meta name="keywords" content="design, computation, parametric, generative, visuals">
        <meta name="author" content="Boyan Mihaylov">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="color-scheme" content="light dark">
        <meta name="fediverse:creator" content="@theknowdough@waag.social">
    </head>
    <body>

        <script src="https://cdn.jsdelivr.net/npm/hydra-synth/dist/hydra-synth.js"></script>
        <script src="./assets/js/hydra_scripts.js"></script>

        <!-- Hidden images for header -->

        <div style="display:none;">
            <img id="logo" src="./assets/img/headers/logo.png">
        </div>

        <div style="display:none;">
            <img id="header-bio" src="./assets/img/headers/page_header_bio.png">
        </div>

        <div style="display:none;">
            <img id="header-proj" src="./assets/img/headers/page_header_proj.png">
        </div>

        <div style="display:none;">
            <img id="header-sols" src="./assets/img/headers/page_header_sols.png">
        </div>

        <div style="display:none;">
            <img id="header-contact" src="./assets/img/headers/page_header_contact.png">
        </div>

        <!-- Hidden image for backgrounds -->

        <div style="display:none;">
            <img id="patterned-img" src="./assets/img/patterned/home.JPG">
        </div>

        <!-- Hidden images for impressions gallery -->

        <div style="display:none;">
            <img class="impressions-left" src="./assets/img/projects/awwp_06.JPG">
        </div>

        <div style="display:none;">
            <img class="impressions-center" src="./assets/img/projects/diplo_01.JPG">
        </div>

        <div style="display:none;">
            <img class="impressions-right" src="./assets/img/projects/pavilion_04.JPG">
        </div>


        <script src="./assets/js/filter_projects.js"></script>

        <!-- Logo & navigation -->
        <script src="./assets/js/navbar.js"></script>
        <header id="page-header">
            <canvas id="canvas-logo"></canvas>
            <ul class="nav">
                <li>
                    <button class="nav-button" id="button-home" type="button" onclick="loadPage(`home`)"></button>
                </li>
                <li>
                    <button class="nav-button" id="button-sols" type="button" onclick="loadPage(`sols`)"></button>
                </li>
                <li>
                    <button class="nav-button" id="button-proj" type="button" onclick="loadPage(`proj`)"></button>
                </li>
                <li>
                    <button class="nav-button" id="button-bio" type="button" onclick="loadPage(`bio`)"></button>
                </li>
                <li>
                    <button class="nav-button" id="button-contact" type="button" onclick="loadPage(`contact`)"></button>
                </li>
            </ul>
        </header>
        <script src="./assets/js/header_transitions.js"></script>
        <script src="./assets/js/gen_logo.js"></script>

        <div class="main-frame-container frozen">
            <div class="overlay-text-container">
                <div class="overlay-text">
                    <main id="main-frame"></main>
                </div>
            </div>
            <div class="spacer"></div>
            <canvas id="canvas-bkg"></canvas>
        </div>

        <script src="./assets/js/pattern_img.js"></script>
        <footer>
            Website by TheKnowDough, 2026 |
            <button id="toggle-legal" onclick="loadPage('legal')">
                Legal
            </button> | 
            <button id="toggle-legal" onclick="loadPage('privacy')">
                Privacy
            </button>
        </footer>
    </body>
</html>
